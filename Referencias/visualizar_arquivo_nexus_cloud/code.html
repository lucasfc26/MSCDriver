<body class="font-body-md text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<main class="w-full max-w-2xl mx-auto glass-card rounded-xl overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.08)]">
<!-- Header -->
<header class="p-gutter border-b border-outline-variant flex items-center justify-between bg-surface/50">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="cloud" data-weight="fill" style="font-variation-settings: 'FILL' 1;">cloud</span>

</div>
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-label-md text-label-md text-on-surface-variant">Partilha Segura</span>
</div>
</header>
<!-- Content -->
<div class="p-stack-lg md:p-[48px] flex flex-col items-center text-center">
<!-- File Icon / Preview Placeholder -->
<div class="w-32 h-32 rounded-lg bg-surface-container-high border border-outline-variant flex items-center justify-center mb-stack-md shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-[64px] text-tertiary" data-icon="insert_drive_file">insert_drive_file</span>
</div>
<!-- File Details -->
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-stack-sm break-all">
                Q3_Relatorio_Financeiro_Final.pdf
            </h1>
<div class="flex items-center gap-stack-md font-body-md text-body-md text-on-surface-variant mb-stack-lg bg-surface-container-low px-stack-md py-stack-sm rounded-full border border-outline-variant">
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-[16px]" data-icon="weight">weight</span>
<span>14.2 MB</span>
</div>
<div class="w-[1px] h-4 bg-outline-variant"></div>
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-[16px]" data-icon="person">person</span>

</div>
</div>

<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="key">key</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-[#E0D7D0] bg-white font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-secondary-fixed-dim" id="password" placeholder="Introduza a palavra-passe" type="password"/>
</div>
</div>

<button class="w-full max-w-sm bg-primary-container text-on-primary font-headline-md text-[16px] font-semibold py-4 px-stack-lg rounded-[12px] flex items-center justify-center gap-stack-sm hover:opacity-90 transition-opacity focus:ring-4 focus:ring-primary/20 outline-none shadow-sm">
