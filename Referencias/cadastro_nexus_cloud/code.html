<!DOCTYPE html>

<html lang="pt"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Criar Conta - Nexus Cloud</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed-variant": "#004c6e",
                      "on-secondary-container": "#67615f",
                      "tertiary-container": "#006e9d",
                      "outline-variant": "#e4beba",
                      "surface-tint": "#b91d20",
                      "on-background": "#271816",
                      "surface-bright": "#fff8f7",
                      "surface-container": "#ffe9e6",
                      "error": "#ba1a1a",
                      "tertiary": "#00557a",
                      "on-tertiary": "#ffffff",
                      "background": "#fff8f7",
                      "primary-fixed": "#ffdad6",
                      "inverse-surface": "#3e2c2a",
                      "secondary-fixed-dim": "#cdc5c2",
                      "outline": "#8f706c",
                      "on-primary-container": "#ffe0dd",
                      "secondary": "#635d5b",
                      "on-surface": "#271816",
                      "surface-dim": "#f0d4d0",
                      "primary": "#a20513",
                      "on-secondary-fixed": "#1e1b19",
                      "on-secondary": "#ffffff",
                      "on-surface-variant": "#5b403d",
                      "on-tertiary-fixed": "#001e2f",
                      "secondary-container": "#e7dedb",
                      "inverse-on-surface": "#ffedea",
                      "error-container": "#ffdad6",
                      "inverse-primary": "#ffb4ac",
                      "surface": "#fff8f7",
                      "primary-fixed-dim": "#ffb4ac",
                      "surface-container-low": "#fff0ef",
                      "secondary-fixed": "#e9e1de",
                      "tertiary-fixed": "#c8e6ff",
                      "tertiary-fixed-dim": "#88ceff",
                      "on-error": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-highest": "#f9dcd9",
                      "primary-container": "#c62828",
                      "on-primary": "#ffffff",
                      "surface-variant": "#f9dcd9",
                      "surface-container-high": "#ffe2de",
                      "on-primary-fixed": "#410003",
                      "on-primary-fixed-variant": "#93000e",
                      "on-error-container": "#93000a",
                      "on-secondary-fixed-variant": "#4b4644",
                      "on-tertiary-container": "#d1eaff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "24px",
                      "stack-sm": "8px",
                      "stack-lg": "32px",
                      "margin-mobile": "16px",
                      "stack-md": "16px",
                      "unit": "4px",
                      "container-max": "1280px",
                      "margin-desktop": "40px"
              },
              "fontFamily": {
                      "headline-lg": ["Manrope"],
                      "headline-lg-mobile": ["Manrope"],
                      "display-lg": ["Manrope"],
                      "body-md": ["Inter"],
                      "headline-md": ["Manrope"],
                      "body-lg": ["Inter"],
                      "label-md": ["JetBrains Mono"]
              },
              "fontSize": {
                      "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "label-md": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}]
              }
            }
          }
        }
    </script>
<style>
        body {
            background-color: #F5F0EB; /* Level 0 Light Beige */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased selection:bg-primary-container selection:text-on-primary">
<div class="w-full max-w-md p-margin-mobile md:p-stack-lg">
<!-- Logo Header -->
<div class="text-center mb-stack-lg">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-surface border border-outline-variant shadow-sm mb-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">cloud</span>
</div>
<h1 class="font-headline-lg text-headline-lg md:font-headline-lg-mobile md:text-headline-lg-mobile text-on-surface mb-2">
                Crie sua conta
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Junte-se ao Nexus Cloud hoje.
            </p>
</div>
<!-- Sign Up Card -->
<div class="bg-surface rounded-xl border border-outline-variant p-stack-lg shadow-sm">
<form action="#" class="space-y-stack-md" method="POST">
<!-- Name Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="name">
                        Nome Completo
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none" id="name" name="name" placeholder="Seu nome" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">
                        E-mail
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none" id="email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">
                        Senha
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="confirm_password">
                        Confirmar Senha
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface text-on-surface font-body-md text-body-md placeholder:text-outline focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 border border-outline-variant rounded bg-surface text-primary-container focus:ring-primary/20 focus:ring-2 transition-all cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 font-body-md text-body-md text-on-surface-variant">
<label class="cursor-pointer" for="terms">
                            Eu concordo com os <a class="text-primary hover:text-primary-container underline transition-colors" href="#">Termos de Serviço</a> e <a class="text-primary hover:text-primary-container underline transition-colors" href="#">Política de Privacidade</a>.
                        </label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-[12px] shadow-sm font-label-md text-label-md uppercase tracking-wider text-on-primary bg-primary-container hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                        Registrar
                    </button>
</div>
</form>
</div>
<!-- Login Link -->
<div class="text-center mt-stack-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                Já tem uma conta?
                <a class="font-headline-md text-body-md text-primary hover:text-primary-container transition-colors" href="#">
                    Entrar
                </a>
</p>
</div>
</div>
</body></html>
